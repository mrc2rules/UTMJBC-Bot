version: '3.8'

services:
  app:
    build: .
    image: ghcr.io/lkaesberg/emailverify:latest
    ports:
      - "8181:8181"
    volumes:
      - app_config:/usr/app/config
      - app_data:/usr/app/data
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    user: "1000:1000"
    read_only: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 50
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: always

volumes:
  app_config:
  app_data:
