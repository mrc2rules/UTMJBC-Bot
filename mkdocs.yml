site_name: UTMJBC Bot
repo_url: https://github.com/mrc2rules/UTMJBC-Bot
theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  logo: https://media.discordapp.net/attachments/1423008246691659898/1521352248779866193/image.png?ex=6a448531&is=6a4333b1&hm=75b044f51e709f66df528d721c97b6b507a935dec42681d7edbc42e34a96ed07&=&format=webp&quality=lossless&width=771&height=770
  favicon: https://media.discordapp.net/attachments/1423008246691659898/1521352248779866193/image.png?ex=6a448531&is=6a4333b1&hm=75b044f51e709f66df528d721c97b6b507a935dec42681d7edbc42e34a96ed07&=&format=webp&quality=lossless&width=771&height=770
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: 'index.md'
  - Commands: 'commands.md'
  - Self Hosting: 'self-hosting.md'
  - Architecture: 'architecture.md'
  - API Reference:
      - Overview: 'api-reference.md'
      - AI Subsystem: 'api/ai.md'
      - Telegram Pipeline: 'api/telegram.md'
      - Database & Telemetry: 'api/database.md'
      - Utilities & Localization: 'api/utilities.md'
  - Statistics: 'statistics.md'
  - Status: 'status.md'
  - Contributing: 'contributing.md'
  - Legal: 'legal.md'

extra_css:
  - stylesheets/extra.css
