name: Auto Deploy Bot to Alwaysdata

on:
  push:
    branches:
      - main  # Fires the automation every time you push to your main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Run deployment script over SSH (Using Password)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            # 1. Navigate to your bot's cloned repository folder on Alwaysdata
            cd ~/www/UTMJBC-Bot
            
            # 2. Reset any accidental manual changes on the server to match GitHub perfectly
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Safely install any new npm dependencies added since last push
            npm install --production
            
            # 4. Terminate the active running process to trigger Alwaysdata's Service auto-restart
            pkill -f "EmailBot.js" || true